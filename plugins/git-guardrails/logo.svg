<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Git Guardrails">
  <!-- background plate -->
  <rect width="512" height="512" rx="112" fill="#0D1117"/>
  <rect x="1" y="1" width="510" height="510" rx="111" fill="none" stroke="#1F2937" stroke-width="2"/>

  <!-- shield -->
  <path d="M256 96 L400 148 V268 C400 356 336 404 256 432 C176 404 112 356 112 268 V148 Z"
        fill="#111827" stroke="#F97316" stroke-width="14" stroke-linejoin="round"/>

  <!-- git branch inside shield -->
  <g stroke="#F97316" stroke-width="18" stroke-linecap="round">
    <!-- trunk -->
    <line x1="216" y1="188" x2="216" y2="336"/>
    <!-- branch out -->
    <path d="M216 236 C216 280 300 244 300 292" fill="none"/>
  </g>
  <g fill="#0D1117" stroke="#F97316" stroke-width="16">
    <circle cx="216" cy="182" r="20"/>
    <circle cx="216" cy="342" r="20"/>
    <circle cx="300" cy="298" r="20"/>
  </g>

  <!-- deny bar across the branch node -->
  <line x1="278" y1="276" x2="322" y2="320" stroke="#EF4444" stroke-width="14" stroke-linecap="round"/>
</svg>
